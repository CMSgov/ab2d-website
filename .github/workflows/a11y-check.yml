name: "Accessibility Check"

on:
  workflow_call:
    inputs:
      feature_path:
        required: true
        type: string

env:
  BASE_PATH: ${{ inputs.feature_path && format('feature/{0}/', inputs.feature_path) || '' }}

jobs:
  a11y-check:
    runs-on: codebuild-ab2d-website-${{github.run_id}}-${{github.run_attempt}}

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.3.0

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'
          # node-version: 20 ## Using a .nvmrc file to stay in sync with the repo

      # Step 3: Set base url/deployment path
      - name: Set Deployment Path
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "DEPLOY_PATH=${{ github.event.number }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_PATH=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      # Step 4: Run pa11y
      - name: Run pa11y
        run: npx pa11y-ci --config pa11yci.ci.json --sitemap ${{ format('https://dveopzwo661ye.cloudfront.net/{0}sitemap.xml', env.BASE_PATH) }} --sitemap-exclude "/*.pdf"  --sitemap-find https://ab2d.cms.gov/ --sitemap-replace https://dveopzwo661ye.cloudfront.net/ --json > pa11y-results.json

      # Step 5: Save pa11y summary
      - name: Save Report to Action Summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');

            const results = "pa11y-results.json"
            const data = JSON.parse(fs.readFileSync(results, "utf-8"))

            let body = "## Accessibility Report \n\n";
            body += "| Status | URL | Errors |\n";
            body += "| ------ | --- | ------ |\n";

            Object.entries(data.results).forEach(([url, issues]) => {
              body += `${issues.length > 0 ? '❌' : '✅' } | ${url} | ${issues.length} errors |\n`;
            });

            core.summary.addRaw(body).write();
