name: "Accessibility Check"

on:
  workflow_call:
    inputs:
      feature_path:
        required: true
        type: string

env:
  BASE_PATH: ${{ inputs.feature_path && format('feature/{0}/', inputs.feature_path) || '' }}

jobs:
  a11y-check:
    runs-on: codebuild-ab2d-website-non-prod-${{github.run_id}}-${{github.run_attempt}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'
          # node-version: 20 ## Using a .nvmrc file to stay in sync with the repo

      - name: Run pa11y
        run: npx pa11y-ci --config pa11yci.ci.json --sitemap "https://dveopzwo661ye.cloudfront.net/${BASE_PATH}sitemap.xml" --sitemap-exclude "/*.pdf"  --sitemap-find https://ab2d.cms.gov/ --sitemap-replace https://dveopzwo661ye.cloudfront.net/ --json > pa11y-results.json

      - name: Save Report to Action Summary
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        # Always return pa11y output, regardless if all pages pass/fail. Job will now fail if errors are found, which is intentional
        if: always()
        with:
          script: |
            const fs = require('fs');

            const results = "pa11y-results.json"
            const data = JSON.parse(fs.readFileSync(results, "utf-8"))

            let body = "## Accessibility Report \n\n";
            body += "| Status | URL | Errors |\n";
            body += "| ------ | --- | ------ |\n";

            Object.entries(data.results).forEach(([url, issues]) => {
              body += `${issues.length > 0 ? '❌' : '✅' } | ${url} | ${issues.length} errors |\n`;
            });

            core.summary.addRaw(body).write();
